server:
  port: ${PORT:8080}
spring:
  application:
    name: payment
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
#      port: ${REDIS_PORT}
#      host: ${REDIS_HOST}
       url: ${REDIS_URL}
       ssl:
         enabled: true


  jpa:
    hibernate:
      ddl-auto: update